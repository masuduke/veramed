version: '3.9'

services:

  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: veramed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       veramed_db
      POSTGRES_USER:     veramed
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veramed -d veramed_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: veramed-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --save 60 1
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend API ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veramed-api
    restart: unless-stopped
    environment:
      NODE_ENV:            production
      DATABASE_URL:        postgresql://veramed:${POSTGRES_PASSWORD:-changeme}@postgres:5432/veramed_db
      REDIS_URL:           redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      JWT_ACCESS_SECRET:   ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET:  ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY:      ${ENCRYPTION_KEY}
      AWS_REGION:          ${AWS_REGION}
      AWS_ACCESS_KEY_ID:   ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET:       ${AWS_S3_BUCKET}
      ANTHROPIC_API_KEY:   ${ANTHROPIC_API_KEY}
      STRIPE_SECRET_KEY:   ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      FRONTEND_URL:        ${FRONTEND_URL:-http://localhost:3000}
      PORT:                4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL:          ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_STRIPE_PK:        ${STRIPE_PUBLISHABLE_KEY}
    container_name: veramed-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ── Nginx Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: veramed-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
